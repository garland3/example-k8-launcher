{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: launcher-postgres
  labels:
    {{- include "launcher.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: launcher-postgres
  ports:
    - port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: launcher-postgres
  labels: {{- include "launcher.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: launcher-postgres
  labels:
    {{- include "launcher.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: launcher-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: launcher-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: launcher-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: launcher-postgres
          env:
            # OpenShift's `restricted` SCC runs the container as a random
            # UID, but the postgres image insists on writing to a known
            # PGDATA path it owns. Pin PGDATA under the mount.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "{{ .Values.postgres.user }}"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "{{ .Values.postgres.user }}"] }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.storage.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
{{- end }}
